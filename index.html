<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container-btn">
        <button class="btn btn1">КНОПКА</button>

        <button class="btn btn2">КНОПКА</button>

        <button class="btn btn3">КНОПКА</button>

        <button class="btn btn4">
            <span class="btn4-text">ОТПРАВИТЬ</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-right"
                viewBox="0 0 16 16">
                <path fill-rule="evenodd"
                    d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8" />
            </svg>
        </button>

        <button class="btn btn5">
            <span class="btn5-text">КОРЗИНА</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                class="bi bi-basket3-fill" viewBox="0 0 16 16">
                <path
                    d="M5.757 1.071a.5.5 0 0 1 .172.686L3.383 6h9.234L10.07 1.757a.5.5 0 1 1 .858-.514L13.783 6H15.5a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5H.5a.5.5 0 0 1-.5-.5v-1A.5.5 0 0 1 .5 6h1.717L5.07 1.243a.5.5 0 0 1 .686-.172zM2.468 15.426.943 9h14.114l-1.525 6.426a.75.75 0 0 1-.729.574H3.197a.75.75 0 0 1-.73-.574z" />
            </svg>
        </button>

        <button class="btn btn6">КОРЗИНА</button>

        <button class="btn btn7"><span class="btn7-text">ЗАКАЗАТЬ</span></button>
    </div>

    <div class="container-card">
        <div class="card" tabindex="0">
            <div class="card-image">
                <img src="/img/f.jpeg" alt="">
            </div>
            <div class="card-content">
                <h3 class="card-title">Лиса</h3>
                <button class="card-btn">Купить</button>
            </div>
        </div>

        <div class="card" tabindex="0">
            <div class="card-image">
                <img src="/img/m.jpg" alt="">
            </div>
            <div class="card-content">
                <h3 class="card-title">Медведь</h3>
                <button class="card-btn">Купить</button>
            </div>
        </div>

        <div class="card" tabindex="0">
            <div class="card-image">
                <img src="/img/tiger.jpg" alt="">
            </div>
            <div class="card-content">
                <h3 class="card-title">Тигр</h3>
                <button class="card-btn">Купить</button>
            </div>
        </div>
    </div>

    <div class="gallery">
        <div class="gallery-item" tabindex="0">
            <div class="gallery-wrapper">
                <img src="/img/f.jpeg" alt="Лиса" class="gallery-img">
                <div class="gallery-overlay"></div>
                <div class="gallery-info">
                    <h3 class="gallery-title">Лиса</h3>
                    <button class="gallery-action">Купить</button>
                </div>
            </div>
        </div>

        <div class="gallery-item" tabindex="0">
            <div class="gallery-wrapper">
                <img src="/img/m.jpg" alt="Медведь" class="gallery-img">
                <div class="gallery-overlay"></div>
                <div class="gallery-info">
                    <h3 class="gallery-title">Медведь</h3>
                    <button class="gallery-action">Купить</button>
                </div>
            </div>
        </div>

        <div class="gallery-item" tabindex="0">
            <div class="gallery-wrapper">
                <img src="/img/tiger.jpg" alt="Тигр" class="gallery-img">
                <div class="gallery-overlay"></div>
                <div class="gallery-info">
                    <h3 class="gallery-title">Тигр</h3>
                    <button class="gallery-action">Купить</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
